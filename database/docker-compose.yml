version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: churn_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: churn_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Web UI to browse your PostgreSQL tables visually
  pgadmin:
    image: dpage/pgadmin4
    container_name: churn_pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kenexai.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data: